name: Build macOS app

# 맥이 없어도 macOS .app/.dmg 를 만들 수 있는 경로: GitHub Actions 의 macOS 러너에서 빌드.
# 수동 실행(Actions 탭 > Run workflow) 또는 태그 push 시 동작. 산출물은 아티팩트로 다운로드.

on:
  workflow_dispatch:        # 수동 실행
  push:
    tags:
      - "v*"               # v0.1.0 등 태그 push 시

jobs:
  build:
    runs-on: macos-14       # Apple Silicon(arm64) 러너. Intel 빌드는 macos-13 사용.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"   # PySide6 6.8+ 안정 조합

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pytest   # pytest 는 테스트 전용(런타임 deps 아님)

      - name: Run core unit tests
        run: PYTHONPATH=src python -m pytest tests -q

      - name: Build .app
        run: python -m PyInstaller mdviewer.spec --noconfirm --clean

      - name: Create DMG
        run: hdiutil create -volname MDViewer -srcfolder dist/MDViewer.app -ov -format UDZO dist/MDViewer.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MDViewer-macos-arm64
          path: dist/MDViewer.dmg

# 참고:
#  - 이 워크플로우는 '미서명' 빌드다. 받은 사람이 처음 열 때 우클릭 > 열기,
#    또는  xattr -dr com.apple.quarantine MDViewer.app  필요.
#  - Developer ID 서명/공증을 CI 에 넣으려면 APPLE_ID/TEAM_ID/인증서를 Secrets 로 추가하고
#    codesign + notarytool 단계를 더한다(references/macos-packaging.md 참조).
#  - Intel 사용자도 지원하려면 macos-13 잡을 추가하거나 universal2 빌드를 구성한다.
